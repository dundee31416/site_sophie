types {
    application/javascript  jsx;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html Lisons.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for image assets (covers/, scans/, authors/).
    # These come in via volume mounts and are immutable per-filename in practice.
    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Don't cache the entry HTML or scripts — rebuilds change them.
    location ~* \.(html|css|jsx|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
