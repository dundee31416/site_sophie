# CI/CD Pipeline for Lisons! (site_sophie)
# Lint + test, build backend + frontend Docker images, push to GHCR, and
# deploy to the TrueNAS host over SSH.
#
# Only main deploys; every image is tagged `latest` AND with the commit SHA
# so a bad deploy can be rolled back by pinning the previous SHA tag.
when:
  - event: push
    branch: main

steps:
  - name: test-backend
    image: python:3.12-slim
    commands:
      - cd backend
      - pip install --quiet --no-cache-dir -r requirements-dev.txt
      - ruff check src tests
      - pytest -q

  - name: lint-frontend
    image: node:20-alpine
    commands:
      - cd frontend
      - npm ci --no-audit --no-fund
      - npm run lint
      - npx tsc -b --force

  - name: build-backend
    image: plugins/docker
    settings:
      repo: ghcr.io/dundee31416/site_sophie-backend
      registry: ghcr.io
      dockerfile: backend/Dockerfile
      context: backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: build-frontend
    image: plugins/docker
    settings:
      repo: ghcr.io/dundee31416/site_sophie-frontend
      registry: ghcr.io
      dockerfile: frontend/Dockerfile
      context: frontend
      target: production
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: prepare-deploy-dir
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      port: 22
      script:
        - mkdir -p /mnt/ssd_pool/apps_data/site_sophie/pg_data
        - mkdir -p /mnt/ssd_pool/apps_data/site_sophie/storage
        - mkdir -p /mnt/ssd_pool/apps_data/site_sophie/inbox
        - mkdir -p /mnt/ssd_pool/apps_data/site_sophie/backups

  - name: copy-compose
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      port: 22
      source: docker-compose.prod.yml
      target: /tmp
      strip_components: 0

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      port: 22
      envs:
        - DOCKER_USERNAME
        - DOCKER_PASSWORD
      script:
        - |
          bash <<'DEPLOY_SCRIPT_END'
          set -e
          echo "=== deploy script v5 (sudo docker) starting ==="
          sudo docker login ghcr.io -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
          mv /tmp/docker-compose.prod.yml /mnt/ssd_pool/apps_data/site_sophie/docker-compose.prod.yml
          cd /mnt/ssd_pool/apps_data/site_sophie
          test -f .env || { echo "FATAL: .env missing in apps_data/site_sophie"; exit 1; }
          sudo docker compose -f docker-compose.prod.yml pull
          sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans
          sudo docker image prune -f
          DEPLOY_SCRIPT_END
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
