# CI/CD Pipeline for Lisons! (site_sophie)
# Builds backend + frontend Docker images, pushes to GHCR, and deploys to the
# TrueNAS host over SSH. Legacy single-image static-site pipeline replaced in
# Phase 1-5 of the FastAPI + React refactor.
steps:
  - name: build-backend
    image: plugins/docker
    settings:
      repo: ghcr.io/dundee31416/site_sophie-backend
      registry: ghcr.io
      dockerfile: backend/Dockerfile
      context: backend
      tags:
        - latest
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: build-frontend
    image: plugins/docker
    settings:
      repo: ghcr.io/dundee31416/site_sophie-frontend
      registry: ghcr.io
      dockerfile: frontend/Dockerfile
      context: frontend
      target: production
      tags:
        - latest
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: prepare-deploy-dir
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      port: 22
      script:
        - mkdir -p /mnt/ssd_pool/apps_data/site_sophie/pg_data
        - mkdir -p /mnt/ssd_pool/apps_data/site_sophie/storage

  - name: copy-compose
    image: appleboy/drone-scp
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      port: 22
      source: docker-compose.prod.yml
      target: /tmp
      strip_components: 0

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      port: 22
      envs:
        - DOCKER_USERNAME
        - DOCKER_PASSWORD
      script:
        - echo "$DOCKER_PASSWORD" | docker login ghcr.io -u "$DOCKER_USERNAME" --password-stdin
        - mv /tmp/docker-compose.prod.yml /mnt/ssd_pool/apps_data/site_sophie/docker-compose.prod.yml
        - cd /mnt/ssd_pool/apps_data/site_sophie
        - test -f .env || (echo "FATAL: /mnt/ssd_pool/apps_data/site_sophie/.env is missing — create it from .env.production.example before deploying." && exit 1)
        - docker compose -f docker-compose.prod.yml pull
        - docker compose -f docker-compose.prod.yml up -d --remove-orphans
        - docker image prune -f
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
