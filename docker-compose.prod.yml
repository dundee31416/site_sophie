services:
  postgres:
    image: postgres:16-alpine
    container_name: site_sophie_pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    image: ghcr.io/dundee31416/site_sophie-backend:latest
    container_name: site_sophie_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-7}
      STORAGE_ROOT: /data/storage
      INBOX_ROOT: /data/inbox
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      COOKIE_NAME: ${COOKIE_NAME:-lisons_session}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      CORS_ORIGINS: '${CORS_ORIGINS:-[]}'
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./storage:/data/storage
      - ./inbox:/data/inbox
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Nightly logical backups. ZFS snapshots cover disaster recovery; pg_dump
  # covers "the app corrupted its own data" and survives dataset-level mistakes.
  db-backup:
    image: postgres:16-alpine
    container_name: site_sophie_db_backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          pg_dump -Fc -f "/backups/lisons-$$ts.dump" && echo "backup ok: lisons-$$ts.dump"
          find /backups -name 'lisons-*.dump' -mtime +$${BACKUP_KEEP_DAYS:-14} -delete
          sleep 86400
        done
    restart: unless-stopped

  frontend:
    image: ghcr.io/dundee31416/site_sophie-frontend:latest
    container_name: site_sophie_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped
